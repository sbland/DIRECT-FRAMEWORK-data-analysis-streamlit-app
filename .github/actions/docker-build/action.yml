name: Build and push Docker Image
description: Build the app docker image and push to a external container repository
inputs:
  github-token:
    description: The GITHUB_TOKEN
    required: true
outputs:
  tag:
    description: The tag name of the docker image
    value: ${{ steps.output-tag-name.outputs.tag }}
runs:
  using: composite
  steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Get image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Output tag name
      id: output-tag-name
      shell: bash
      run: echo "tag=${{ steps.meta.outputs.tags[0] }}" >> $GITHUB_OUTPUT
